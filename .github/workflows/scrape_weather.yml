name: Weather Data Scraper

on:
  schedule:
    # Run every 6 hours (0, 6, 12, 18)
    - cron: '0 */6 * * *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  scrape-and-process:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run weather scrapers
        run: |
          python -c "
import logging
import sys
import time
from main import load_cities, collect_for_source
from scrapers.openmeteo_scraper import scrape_openmeteo
from scrapers.timeanddate_scraper import scrape_timeanddate
from scrapers.wunderground_scraper import scrape_wunderground
from utils import setup_logging, ensure_directories
import config

setup_logging()
ensure_directories()

cities = load_cities()
print(f'Loaded {len(cities)} cities')

# Scrape all sources
collect_for_source(cities, scrape_openmeteo, 0, 'Open-Meteo')
time.sleep(30)
collect_for_source(cities, scrape_timeanddate, 0, 'TimeAndDate')
time.sleep(30)
collect_for_source(cities, scrape_wunderground, 0, 'WeatherUnderground')
          "
      
      - name: Clean and merge data
        run: |
          python processing/clean_data.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/raw/*.csv
          git add data/processed/*.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update weather data - $(date -u +'%Y-%m-%d %H:%M:%S')" && git push)
        continue-on-error: true
