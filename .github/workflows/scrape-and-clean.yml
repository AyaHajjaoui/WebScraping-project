name: Weather Scrape and Process

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

concurrency:
  group: weather-scrape-and-process
  cancel-in-progress: false

jobs:
  scrape-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run one scraping cycle
        run: python -c "import main; main.run_once()"

      - name: Run cleaning and preprocessing
        run: python processing/preprocess.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weather-data-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            data/raw/**/*.csv
            data/processed/**/*.csv
            data/processed/**/*.xlsx
            logs/**/*.log
            logs/**/*.txt

      - name: Detect changes
        id: detect_changes
        run: |
          if [ -d "data" ]; then
            git add data/
          fi

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.detect_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update scraped weather data (run ${{ github.run_id }})" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}