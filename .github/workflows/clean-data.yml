name: Clean and Process Data

on:
  workflow_run:
    workflows: ["Scrape Weather Data"]
    types:
      - completed
  workflow_dispatch:  # Allow manual triggering

jobs:
  clean:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Clean and combine raw data
        run: python processing/clean_data.py
      
      - name: Commit cleaned data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/processed/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update cleaned weather data $(date +'%Y-%m-%d %H:%M:%S')" && git push)
        if: always()
