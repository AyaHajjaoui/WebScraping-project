name: Weather Scrape and Process

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

concurrency:
  group: weather-scrape-and-process
  cancel-in-progress: true

jobs:
  scrape-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Sync with remote branch
        run: |
          set -euxo pipefail
          git fetch origin "${{ github.ref_name }}"
          git checkout "${{ github.ref_name }}"
          git pull --rebase origin "${{ github.ref_name }}"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run one scraping cycle
        run: |
          set -euxo pipefail
          python -c "import main; main.run_once()"

      - name: Run cleaning and preprocessing
        run: |
          set -euxo pipefail
          python processing/preprocess.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weather-data-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            data/raw/**/*.csv
            data/processed/**/*.csv
            data/processed/**/*.xlsx
            logs/**/*.log
            logs/**/*.txt

      - name: Detect changes
        id: detect_changes
        run: |
          set -euxo pipefail

          if [ -d "data" ]; then
            git add data/
          fi

          if [ -d "logs" ]; then
            git add logs/
          fi

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.detect_changes.outputs.changed == 'true'
        run: |
          set -euxo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "chore: update scraped weather data (run ${{ github.run_id }})"

          for attempt in 1 2 3; do
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi

            echo "Push failed on attempt $attempt. Rebasing and retrying..."
            git pull --rebase --autostash origin "${{ github.ref_name }}"
          done

          echo "Push failed after 3 attempts."
          exit 1